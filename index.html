<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FATIMA YOUTH FEDERATION OF YAYAMULLA</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        /* Specific Styles for Login/Signup Overrides */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            /* Hide scrollbars for full screen effect */
        }

        .login-wrapper {
            position: relative;
            width: 800px;
            max-width: 95%;
            height: 500px;
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: var(--border-radius);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            overflow: hidden;
            z-index: 10;
        }

        /* The Animated Cover Panel */
        .cover-panel {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            color: white;
        }

        .cover-panel h2 {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .cover-panel p {
            margin-bottom: 30px;
            font-size: 1rem;
            opacity: 0.9;
        }

        .cover-panel .btn-outline {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 10px 30px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .cover-panel .btn-outline:hover {
            background: white;
            color: var(--primary-color);
        }

        /* Form Containers */
        .form-box {
            width: 50%;
            height: 100%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .form-box h3 {
            font-family: var(--font-heading);
            font-size: 2rem;
            margin-bottom: 25px;
            color: var(--text-main);
        }

        .form-box form {
            width: 100%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            position: relative;
            width: 100%;
        }

        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--surface-border);
            color: var(--text-main);
            padding: 12px 15px 12px 40px;
            border-radius: var(--border-radius-sm);
            font-size: 1rem;
            outline: none;
            transition: var(--transition-fast);
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .input-group ion-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .form-box .btn-primary {
            margin-top: 10px;
            width: 100%;
        }

        .form-links {
            margin-top: 15px;
            text-align: center;
            font-size: 0.85rem;
        }

        .form-links a {
            color: var(--accent-color);
            text-decoration: none;
            transition: var(--transition-fast);
        }

        .form-links a:hover {
            color: var(--primary-color);
            text-decoration: underline;
        }

        /* Toggle State Classes */
        .login-wrapper.active .cover-panel {
            transform: translateX(-100%);
            border-radius: 0 var(--border-radius) var(--border-radius) 0;
        }

        /* Responsive Layout Update */
        @media (max-width: 768px) {
            .cover-panel {
                display: none;
                /* Hide fancy panel on mobile */
            }

            .form-box {
                width: 100%;
                display: none;
                /* Hide both forms initially */
            }

            .form-box.mobile-active {
                display: flex;
                /* Only show active form */
            }

            .login-wrapper {
                height: auto;
                padding: 20px 0;
            }

            .mobile-toggle {
                display: block;
                text-align: center;
                margin-top: 20px;
                color: var(--text-muted);
            }

            .mobile-toggle span {
                color: var(--accent-color);
                cursor: pointer;
                font-weight: 600;
            }
        }

        @media (min-width: 769px) {
            .mobile-toggle {
                display: none;
            }
        }

        .company-branding {
            position: absolute;
            top: 30px;
            left: 30px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1.2rem;
            z-index: 100;
        }
    </style>
</head>

<body>
    <!-- Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="company-branding">
        <ion-icon name="aperture-outline" style="color: var(--accent-color); font-size: 1.8rem;"></ion-icon>
        <span>FATIMA YOUTH FEDERATION</span>
    </div>

    <div class="login-wrapper" id="loginWrapper">

        <!-- Login Form (Left Side) -->
        <div class="form-box login-box mobile-active" id="loginBox">
            <h3>Welcome Back</h3>
            <form onsubmit="event.preventDefault(); window.location.href='app.html';">
                <div class="input-group">
                    <ion-icon name="mail-outline"></ion-icon>
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" placeholder="Password" required>
                </div>
                <div class="form-links">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>

                <div class="mobile-toggle">
                    Don't have an account? <span id="mobileToRegister">Sign Up</span>
                </div>
            </form>
        </div>

        <!-- Register Form (Right Side) -->
        <div class="form-box register-box" id="registerBox">
            <h3>Create Account</h3>
            <form onsubmit="event.preventDefault(); window.location.href='app.html';">
                <div class="input-group">
                    <ion-icon name="person-outline"></ion-icon>
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <ion-icon name="mail-outline"></ion-icon>
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">Sign Up</button>

                <div class="mobile-toggle">
                    Already have an account? <span id="mobileToLogin">Sign In</span>
                </div>
            </form>
        </div>

        <!-- Animated Cover Panel -->
        <div class="cover-panel">
            <h2 id="coverTitle">Hello, Friend!</h2>
            <p id="coverDesc">Enter your personal details and start your journey with us.</p>
            <button class="btn-outline" id="coverBtn">Sign Up</button>
        </div>
    </div>

    <script>
        const loginWrapper = document.getElementById('loginWrapper');
        const coverBtn = document.getElementById('coverBtn');
        const coverTitle = document.getElementById('coverTitle');
        const coverDesc = document.getElementById('coverDesc');

        const mobileToRegister = document.getElementById('mobileToRegister');
        const mobileToLogin = document.getElementById('mobileToLogin');
        const loginBox = document.getElementById('loginBox');
        const registerBox = document.getElementById('registerBox');

        let isLogin = true;

        // Desktop Slide Logic
        coverBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            loginWrapper.classList.toggle('active');

            // Switch Text after a tiny delay for smoother animation
            setTimeout(() => {
                if (isLogin) {
                    coverTitle.innerText = "Hello, Youth!";
                    coverDesc.innerText = "Be part of Fatima Youth Federation. Create your account today.";
                    coverBtn.innerText = "Sign Up";
                } else {
                    coverTitle.innerText = "Welcome Back!";
                    coverDesc.innerText = "To keep connected with us please login with your personal info.";
                    coverBtn.innerText = "Sign In";
                }
            }, 300);
        });

        // Mobile Toggle Logic
        mobileToRegister.addEventListener('click', () => {
            loginBox.classList.remove('mobile-active');
            registerBox.classList.add('mobile-active');
        });

        mobileToLogin.addEventListener('click', () => {
            registerBox.classList.remove('mobile-active');
            loginBox.classList.add('mobile-active');
        });
    </script>
</body>

</html>
